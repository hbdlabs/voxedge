app = 'edge-rag-brain'
primary_region = 'arn'

[build]

[env]
  EDGE_MODE = 'chat'
  EDGE_LOCAL_LANGUAGE = 'Norwegian'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'suspend'
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  memory = '4096'
  cpu_kind = 'shared'
  cpus = 4

[checks]
  [checks.health]
    type = 'http'
    port = 8080
    path = '/health'
    interval = '30s'
    timeout = '10s'
    grace_period = '300s'
