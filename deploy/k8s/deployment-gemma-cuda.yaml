apiVersion: apps/v1
kind: Deployment
metadata:
  name: voxedge
  namespace: voxedge
  labels:
    app: voxedge
    app.kubernetes.io/part-of: voxedge
    voxedge/profile: gemma-cuda
spec:
  replicas: 1
  selector:
    matchLabels:
      app: voxedge
  template:
    metadata:
      labels:
        app: voxedge
        voxedge/profile: gemma-cuda
    spec:
      # Requires a node with an NVIDIA GPU and the NVIDIA device plugin
      # installed. nodeSelector / tolerations are left to the cluster operator.
      containers:
        - name: voxedge
          image: voxedge:cuda
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: EDGE_MODEL_PROFILE
              value: "gemma-cuda"
            - name: EDGE_MODEL_PATH
              value: "/data/models/gemma-4-e2b-q4_k_m.gguf"
            - name: EDGE_N_CTX
              value: "8192"
            - name: EDGE_MAX_TOKENS
              value: "800"
            - name: EDGE_RERANKER_MODEL
              value: "jinaai/jina-reranker-v2-base-multilingual"
            - name: EDGE_CACHE_DIR
              value: "/data/qdrant/model_cache"
          resources:
            requests:
              cpu: "2"
              memory: "8Gi"
              nvidia.com/gpu: "1"
            limits:
              memory: "16Gi"
              nvidia.com/gpu: "1"
          volumeMounts:
            - name: qdrant-storage
              mountPath: /data/qdrant
          startupProbe:
            httpGet:
              path: /health
              port: 8080
            failureThreshold: 60
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            periodSeconds: 10
            timeoutSeconds: 10
            failureThreshold: 10
      volumes:
        - name: qdrant-storage
          persistentVolumeClaim:
            claimName: voxedge-qdrant
